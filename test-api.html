<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <h1>API Connection Test</h1>
    
    <button onclick="testAPI('http://127.0.0.1:3000/api/stats')">Test API (127.0.0.1)</button>
    <button onclick="testAPI('http://localhost:3000/api/stats')">Test API (localhost)</button>
    <button onclick="testAPI('http://127.0.0.1:3000/')">Test Root (127.0.0.1)</button>
    <button onclick="testAPI('http://localhost:3000/')">Test Root (localhost)</button>
    
    <div id="result" class="result"></div>
    
    <script>
        async function testAPI(url) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing...</p>';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                resultDiv.innerHTML = `<h3>Success!</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
                resultDiv.className = 'result success';
            } catch (error) {
                resultDiv.innerHTML = `<h3>Error</h3><p>${error.message}</p>`;
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
