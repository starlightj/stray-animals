<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园流浪动物管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .nav-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 24px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: #667eea;
            color: white;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .stat-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .table tr:hover {
            background: #f8f9fa;
        }

        .animal-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #f0f7ff;
        }

        .upload-area input {
            display: none;
        }

        .result-card {
            background: #f0f7ff;
            border: 1px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .result-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .animal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .animal-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .animal-card:hover {
            transform: translateY(-5px);
        }

        .animal-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .animal-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .animal-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
            margin-top: 8px;
        }

        .search-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-area input,
        .search-area select {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
        }

        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .detail-modal.active {
            display: flex;
        }

        .detail-content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            width: 90%;
        }

        .detail-content img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .close-btn {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .map-container {
            max-height: 500px;
            background: #e9ecef;
            border-radius: 10px;
            padding: 20px;
            overflow-y: auto;
            color: #666;
            font-size: 16px;
        }

        #mapContent {
            width: 100%;
        }

        #mapMarkers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐾 基于图像识别的校园流浪动物管理系统</h1>
            <p>Campus Stray Animal Management System with Image Recognition</p>
        </div>

        <div class="nav-menu">
            <button class="nav-btn active" onclick="showPage('dashboard')">📊 数据看板</button>
            <button class="nav-btn" onclick="showPage('recognize')">📷 识别上报</button>
            <button class="nav-btn" onclick="showPage('archive')">📋 动物档案</button>
            <button class="nav-btn" onclick="showPage('map')">🗺️ 地图追踪</button>
            <button class="nav-btn" onclick="showPage('admin')">⚙️ 管理后台</button>
        </div>

        <div id="dashboard" class="page active">
            <div class="card">
                <h2>📊 数据概览</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 id="totalAnimals">0</h3>
                        <p>总动物数量</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="speciesCount">0</h3>
                        <p>物种数量</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="todayAdd">0</h3>
                        <p>今日新增</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="recognitions">0</h3>
                        <p>识别次数</p>
                    </div>
                </div>

                <h2 style="margin-top: 30px;">🐕 最新登记动物</h2>
                <div id="latestAnimals" class="animal-grid"></div>
            </div>
        </div>

        <div id="recognize" class="page">
            <div class="card">
                <h2>📷 动物图像识别</h2>
                <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                    <p>点击上传图片</p>
                    <p style="font-size: 12px; margin-top: 10px; color: #999;">支持 JPG、PNG 格式</p>
                    <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
                </div>

                <div id="recognitionResult" style="display: none;">
                    <div class="result-card">
                        <h3>🎉 识别结果</h3>
                        <div class="result-item">
                            <span>物种</span>
                            <span id="recSpecies">-</span>
                        </div>
                        <div class="result-item">
                            <span>颜色</span>
                            <span id="recColor">-</span>
                        </div>
                        <div class="result-item">
                            <span>置信度</span>
                            <span id="recConfidence">-</span>
                        </div>
                        <div class="result-item">
                            <span>特征描述</span>
                            <span id="recFeatures">-</span>
                        </div>
                    </div>
                </div>

                <div id="saveForm" style="display: none;">
                    <h2 style="margin-top: 30px;">💾 保存动物信息</h2>
                    <form onsubmit="saveAnimal(event)">
                        <div class="form-group">
                            <label>动物名称</label>
                            <input type="text" id="animalName" placeholder="请输入动物名称（选填）">
                        </div>
                        <div class="form-group">
                            <label>物种</label>
                            <select id="animalSpecies" required>
                                <option value="">请选择物种</option>
                                <option value="猫">猫</option>
                                <option value="狗">狗</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>毛色</label>
                            <input type="text" id="animalColor" placeholder="请输入毛色" required>
                        </div>
                        <div class="form-group">
                            <label>特征描述</label>
                            <textarea id="animalFeatures" placeholder="请输入特征描述（选填）"></textarea>
                        </div>
                        <div class="form-group">
                            <label>发现地点</label>
                            <input type="text" id="animalLocation" placeholder="例如：图书馆前、教学楼旁">
                        </div>
                        <div class="btn-group">
                            <button type="submit" class="btn">保存登记</button>
                            <button type="button" class="btn btn-secondary" onclick="resetRecognition()">重置</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="archive" class="page">
            <div class="card">
                <h2>📋 动物档案库</h2>
                <div class="search-area">
                    <input type="text" id="searchInput" placeholder="搜索名称或特征..." oninput="searchAnimals()">
                    <select id="speciesFilter" onchange="filterAnimals()">
                        <option value="">全部物种</option>
                        <option value="猫">猫</option>
                        <option value="狗">狗</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div id="animalGrid" class="animal-grid"></div>
            </div>
        </div>

        <div id="map" class="page">
            <div class="card">
                <h2>🗺️ 地图追踪</h2>
                <div class="search-area">
                    <select id="mapSpeciesFilter" onchange="filterMapAnimals()">
                        <option value="">全部物种</option>
                        <option value="猫">猫</option>
                        <option value="狗">狗</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="map-container">
                    <div id="mapContent">
                        <h3>📍 动物位置分布图</h3>
                        <p style="margin-top: 20px;">点击下方标记查看详情</p>
                        <div id="mapMarkers" style="margin-top: 30px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="admin" class="page">
            <div class="card">
                <h2>⚙️ 管理后台</h2>
                
                <div style="margin-bottom: 20px;">
                    <button class="btn" onclick="showAddForm()">➕ 添加新动物</button>
                </div>

                <div id="addAnimalForm" style="display: none; margin-bottom: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                    <h3>添加新动物</h3>
                    <form onsubmit="addAnimal(event)">
                        <div class="form-group">
                            <label>动物名称</label>
                            <input type="text" id="newAnimalName" placeholder="请输入动物名称（选填）">
                        </div>
                        <div class="form-group">
                            <label>物种</label>
                            <select id="newAnimalSpecies" required>
                                <option value="">请选择物种</option>
                                <option value="猫">猫</option>
                                <option value="狗">狗</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>毛色</label>
                            <input type="text" id="newAnimalColor" placeholder="请输入毛色" required>
                        </div>
                        <div class="form-group">
                            <label>特征描述</label>
                            <textarea id="newAnimalFeatures" placeholder="请输入特征描述（选填）"></textarea>
                        </div>
                        <div class="form-group">
                            <label>图片URL</label>
                            <input type="text" id="newAnimalImage" placeholder="请输入图片URL" required>
                        </div>
                        <div class="form-group">
                            <label>发现地点</label>
                            <input type="text" id="newAnimalLocation" placeholder="例如：图书馆前">
                        </div>
                        <div class="btn-group">
                            <button type="submit" class="btn">保存</button>
                            <button type="button" class="btn btn-secondary" onclick="hideAddForm()">取消</button>
                        </div>
                    </form>
                </div>

                <h3 style="margin-top: 30px;">动物列表</h3>
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>名称</th>
                            <th>物种</th>
                            <th>毛色</th>
                            <th>登记时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="detailModal" class="detail-modal">
        <div class="detail-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:3000/api';
        let recognitionsCount = 0;
        let currentAnimal = null;

        async function fetchAPI(url, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${url}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                if (!response.ok) throw new Error('API请求失败');
                return await response.json();
            } catch (error) {
                console.error('API错误:', error);
                alert('请求失败: ' + error.message);
                throw error;
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.target.classList.add('active');

            if (pageId === 'dashboard') {
                updateDashboard();
            } else if (pageId === 'archive') {
                renderAnimalGrid();
            } else if (pageId === 'map') {
                renderMap();
            } else if (pageId === 'admin') {
                renderAdminTable();
            }
        }

        async function updateDashboard() {
            try {
                const [stats, latestAnimals] = await Promise.all([
                    fetchAPI('/stats'),
                    fetchAPI('/stats/latest')
                ]);

                document.getElementById('totalAnimals').textContent = stats.totalAnimals;
                document.getElementById('speciesCount').textContent = stats.speciesCount;
                document.getElementById('todayAdd').textContent = stats.todayAdd;
                document.getElementById('recognitions').textContent = stats.recognitions;

                let html = '';
                latestAnimals.forEach(animal => {
                    html += `
                        <div class="animal-card" onclick="showAnimalDetail('${animal.id}')">
                            <img src="${animal.imageUrl}" alt="${animal.name || '动物'}">
                            <h3>${animal.name || '未命名'}</h3>
                            <p><span class="tag">${animal.species}</span> ${animal.color}</p>
                            <p>${animal.location.address}</p>
                        </div>
                    `;
                });
                document.getElementById('latestAnimals').innerHTML = html || '<p>暂无数据</p>';
            } catch (error) {
                console.error('更新看板失败:', error);
            }
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const result = await fetchAPI('/recognition/image', {
                    method: 'POST'
                });

                if (result.success) {
                    recognitionsCount++;
                    const data = result.data;
                    document.getElementById('recSpecies').textContent = data.species;
                    document.getElementById('recColor').textContent = data.color;
                    document.getElementById('recConfidence').textContent = Math.round(data.confidence * 100) + '%';
                    document.getElementById('recFeatures').textContent = data.features;

                    document.getElementById('animalSpecies').value = data.species;
                    document.getElementById('animalColor').value = data.color;
                    document.getElementById('animalFeatures').value = data.features;

                    document.getElementById('recognitionResult').style.display = 'block';
                    document.getElementById('saveForm').style.display = 'block';
                    alert('识别成功！');
                }
            } catch (error) {
                console.error('识别失败:', error);
                alert('识别失败，请重试');
            }
        }

        async function saveAnimal(event) {
            event.preventDefault();

            const animalData = {
                name: document.getElementById('animalName').value || '未命名',
                species: document.getElementById('animalSpecies').value,
                color: document.getElementById('animalColor').value,
                features: document.getElementById('animalFeatures').value,
                imageUrl: 'https://picsum.photos/400/300?random=' + Date.now(),
                location: {
                    latitude: 39.9042 + Math.random() * 0.01,
                    longitude: 116.4074 + Math.random() * 0.01,
                    address: document.getElementById('animalLocation').value || '校园内'
                }
            };

            try {
                await fetchAPI('/animals', {
                    method: 'POST',
                    body: JSON.stringify(animalData)
                });
                alert('保存成功！');
                resetRecognition();
            } catch (error) {
                console.error('保存失败:', error);
            }
        }

        function resetRecognition() {
            document.getElementById('recognitionResult').style.display = 'none';
            document.getElementById('saveForm').style.display = 'none';
            document.getElementById('animalName').value = '';
            document.getElementById('animalSpecies').value = '';
            document.getElementById('animalColor').value = '';
            document.getElementById('animalFeatures').value = '';
            document.getElementById('animalLocation').value = '';
            document.getElementById('imageInput').value = '';
        }

        async function renderAnimalGrid() {
            try {
                const animals = await fetchAPI('/animals');
                let html = '';
                animals.forEach(animal => {
                    html += `
                        <div class="animal-card" onclick="showAnimalDetail('${animal.id}')">
                            <img src="${animal.imageUrl}" alt="${animal.name || '动物'}">
                            <h3>${animal.name || '未命名'}</h3>
                            <p><span class="tag">${animal.species}</span> ${animal.color}</p>
                            <p>${animal.features || '暂无描述'}</p>
                            <p style="font-size: 12px; color: #999; margin-top: 10px;">
                                📍 ${animal.location.address}
                            </p>
                        </div>
                    `;
                });
                document.getElementById('animalGrid').innerHTML = html || '<p>暂无数据</p>';
            } catch (error) {
                console.error('加载动物列表失败:', error);
            }
        }

        async function searchAnimals() {
            const searchTerm = document.getElementById('searchInput').value;
            if (!searchTerm) {
                renderAnimalGrid();
                return;
            }
            try {
                const animals = await fetchAPI(`/animals/search/query?query=${encodeURIComponent(searchTerm)}`);
                renderFilteredAnimals(animals);
            } catch (error) {
                console.error('搜索失败:', error);
            }
        }

        async function filterAnimals() {
            const species = document.getElementById('speciesFilter').value;
            const searchTerm = document.getElementById('searchInput').value;

            try {
                let animals;
                if (species) {
                    animals = await fetchAPI(`/animals/filter/species?species=${encodeURIComponent(species)}`);
                } else {
                    animals = await fetchAPI('/animals');
                }

                if (searchTerm) {
                    const searchLower = searchTerm.toLowerCase();
                    animals = animals.filter(animal =>
                        animal.name?.toLowerCase().includes(searchLower) ||
                        animal.features?.toLowerCase().includes(searchLower)
                    );
                }
                renderFilteredAnimals(animals);
            } catch (error) {
                console.error('筛选失败:', error);
            }
        }

        function renderFilteredAnimals(filteredAnimals) {
            let html = '';
            filteredAnimals.forEach(animal => {
                html += `
                    <div class="animal-card" onclick="showAnimalDetail('${animal.id}')">
                        <img src="${animal.imageUrl}" alt="${animal.name || '动物'}">
                        <h3>${animal.name || '未命名'}</h3>
                        <p><span class="tag">${animal.species}</span> ${animal.color}</p>
                        <p>${animal.features || '暂无描述'}</p>
                        <p style="font-size: 12px; color: #999; margin-top: 10px;">
                            📍 ${animal.location.address}
                        </p>
                    </div>
                `;
            });
            document.getElementById('animalGrid').innerHTML = html || '<p>没有找到匹配的动物</p>';
        }

        async function showAnimalDetail(id) {
            try {
                currentAnimal = await fetchAPI(`/animals/${id}`);
                const html = `
                    <img src="${currentAnimal.imageUrl}" alt="${currentAnimal.name || '动物'}">
                    <h2 style="color: #333; margin-bottom: 20px;">${currentAnimal.name || '未命名'}</h2>
                    <p style="margin-bottom: 10px;"><strong>物种:</strong> ${currentAnimal.species}</p>
                    <p style="margin-bottom: 10px;"><strong>毛色:</strong> ${currentAnimal.color}</p>
                    <p style="margin-bottom: 10px;"><strong>特征:</strong> ${currentAnimal.features || '暂无描述'}</p>
                    <p style="margin-bottom: 10px;"><strong>发现地点:</strong> ${currentAnimal.location.address}</p>
                    <p style="margin-bottom: 10px;"><strong>登记时间:</strong> ${new Date(currentAnimal.createdAt).toLocaleString()}</p>
                    <div class="btn-group" style="margin-top: 30px;">
                        <button class="btn" onclick="editAnimal('${currentAnimal.id}')">编辑</button>
                        <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
                    </div>
                `;
                document.getElementById('detailContent').innerHTML = html;
                document.getElementById('detailModal').classList.add('active');
            } catch (error) {
                console.error('加载详情失败:', error);
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        async function renderMap() {
            try {
                const animals = await fetchAPI('/map');
                let html = '';
                animals.forEach(animal => {
                    html += `
                        <div class="animal-card" onclick="showAnimalDetail('${animal.id}')">
                            <img src="${animal.imageUrl}" alt="${animal.name || '动物'}">
                            <h3>${animal.name || '未命名'}</h3>
                            <p><span class="tag">${animal.species}</span></p>
                            <p style="font-size: 12px;">📍 ${animal.location.address}</p>
                        </div>
                    `;
                });
                document.getElementById('mapMarkers').innerHTML = html || '<p style="text-align: center;">暂无数据</p>';
            } catch (error) {
                console.error('加载地图数据失败:', error);
            }
        }

        async function filterMapAnimals() {
            const species = document.getElementById('mapSpeciesFilter').value;
            const url = species ? `/map/filter?species=${encodeURIComponent(species)}` : '/map';

            try {
                const animals = await fetchAPI(url);
                let html = '';
                animals.forEach(animal => {
                    html += `
                        <div class="animal-card" onclick="showAnimalDetail('${animal.id}')">
                            <img src="${animal.imageUrl}" alt="${animal.name || '动物'}">
                            <h3>${animal.name || '未命名'}</h3>
                            <p><span class="tag">${animal.species}</span></p>
                            <p style="font-size: 12px;">📍 ${animal.location.address}</p>
                        </div>
                    `;
                });
                document.getElementById('mapMarkers').innerHTML = html || '<p style="text-align: center;">没有找到匹配的动物</p>';
            } catch (error) {
                console.error('筛选地图数据失败:', error);
            }
        }

        async function renderAdminTable() {
            try {
                const animals = await fetchAPI('/animals');
                let html = '';
                animals.forEach(animal => {
                    html += `
                        <tr>
                            <td>${animal.id}</td>
                            <td>${animal.name || '未命名'}</td>
                            <td>${animal.species}</td>
                            <td>${animal.color}</td>
                            <td>${new Date(animal.createdAt).toLocaleString()}</td>
                            <td>
                                <button class="btn" style="padding: 6px 12px; font-size: 12px;" onclick="editAnimal('${animal.id}')">编辑</button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('adminTableBody').innerHTML = html || '<tr><td colspan="6">暂无数据</td></tr>';
            } catch (error) {
                console.error('加载管理列表失败:', error);
            }
        }

        function showAddForm() {
            document.getElementById('addAnimalForm').style.display = 'block';
        }

        function hideAddForm() {
            document.getElementById('addAnimalForm').style.display = 'none';
            document.getElementById('newAnimalName').value = '';
            document.getElementById('newAnimalSpecies').value = '';
            document.getElementById('newAnimalColor').value = '';
            document.getElementById('newAnimalFeatures').value = '';
            document.getElementById('newAnimalImage').value = '';
            document.getElementById('newAnimalLocation').value = '';
        }

        async function addAnimal(event) {
            event.preventDefault();

            const animalData = {
                name: document.getElementById('newAnimalName').value || '未命名',
                species: document.getElementById('newAnimalSpecies').value,
                color: document.getElementById('newAnimalColor').value,
                features: document.getElementById('newAnimalFeatures').value,
                imageUrl: document.getElementById('newAnimalImage').value,
                location: {
                    latitude: 39.9042 + Math.random() * 0.01,
                    longitude: 116.4074 + Math.random() * 0.01,
                    address: document.getElementById('newAnimalLocation').value || '校园内'
                }
            };

            try {
                await fetchAPI('/animals', {
                    method: 'POST',
                    body: JSON.stringify(animalData)
                });
                alert('添加成功！');
                hideAddForm();
                renderAdminTable();
            } catch (error) {
                console.error('添加失败:', error);
            }
        }

        async function editAnimal(id) {
            const animal = await fetchAPI(`/animals/${id}`);
            if (!animal) return;
            alert('编辑功能：' + animal.name + '\n\n（完整编辑功能待实现）');
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateDashboard();
        });
    </script>
</body>
</html>
